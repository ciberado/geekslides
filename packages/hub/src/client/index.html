<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeekSlides Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gs-bg: #0f172a;
      --gs-surface: #1e293b;
      --gs-border: #334155;
      --gs-text: #f1f5f9;
      --gs-text-muted: #94a3b8;
      --gs-accent: #3b82f6;
      --gs-accent-hover: #2563eb;
      --gs-danger: #ef4444;
      --gs-success: #22c55e;
      --gs-warning: #f59e0b;
      --gs-radius: 8px;
      --gs-font: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }
    body {
      font-family: var(--gs-font);
      background: var(--gs-bg);
      color: var(--gs-text);
      min-height: 100dvh;
    }
    a { color: var(--gs-accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
  <script type="module" src="./main.ts"></script>
</head>
<body>
  <hub-app></hub-app>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeekSlides v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <geek-slideshow id="slideshow"></geek-slideshow>
  <geek-terminal></geek-terminal>
  <script type="module">
    import { parse, headerPreprocessor, CommandSystem, KeyBindings, Terminal } from '/packages/engine/src/index.ts';

    // Map of available preprocessors (v1 compat names)
    const PREPROCESSORS = {
      'headerPreprocessor': headerPreprocessor,
      'header': headerPreprocessor,
    };

    const slideshow = document.getElementById('slideshow');

    // Load config
    let configUrl = 'config.json';
    const params = new URLSearchParams(window.location.search);
    if (params.has('config')) {
      configUrl = params.get('config');
    }

    // Resolve paths relative to config location
    const configBase = configUrl.substring(0, configUrl.lastIndexOf('/') + 1);
    function resolveUrl(path) {
      if (path.startsWith('http://') || path.startsWith('https://') || path.startsWith('/')) {
        return path;
      }
      return configBase + path;
    }

    try {
      const configRes = await fetch(configUrl);
      const config = await configRes.json();

      // Load content (v1 compat: may be array)
      let contentFile = 'README.md';
      if (typeof config.content === 'string') {
        contentFile = config.content;
      } else if (Array.isArray(config.content) && config.content.length > 0) {
        contentFile = config.content[0];
      }
      const contentRes = await fetch(resolveUrl(contentFile));
      const markdown = await contentRes.text();

      // Load external styles from config
      const styleUrls = Array.isArray(config.styles) ? config.styles : [];
      const cssTexts = await Promise.all(
        styleUrls.map(async (url) => {
          try {
            const res = await fetch(resolveUrl(url) + '?raw');
            return await res.text();
          } catch {
            console.warn(`Failed to load style: ${url}`);
            return '';
          }
        })
      );
      const combinedCss = cssTexts.join('\n');

      // Set <base> so relative paths in markdown (images, etc.) resolve to deck dir
    // Must be set AFTER all fetch() calls since <base> changes how relative URLs resolve
    if (configBase) {
      const base = document.createElement('base');
      base.href = window.location.origin + '/' + configBase;
      document.head.appendChild(base);
    }

    // Apply preprocessors from config (v1 compat: preprocessors at root or plugins.preprocessors)
    const ppNames = config.preprocessors || config.plugins?.preprocessors || [];
    let processedMarkdown = markdown;
    for (const name of ppNames) {
      const pp = PREPROCESSORS[name];
      if (pp) {
        processedMarkdown = pp(processedMarkdown);
      }
    }

    // Parse and render
      const slides = parse(processedMarkdown);

      // Inject external styles before loading slides
      if (combinedCss) {
        slideshow.loadStyles(combinedCss);
      }
      slideshow.loadSlides(slides);

      // Set aspect ratio (v1 compat: resolution "1920x1080")
      if (config.aspectRatio) {
        slideshow.setAspectRatio(config.aspectRatio);
      } else if (config.resolution) {
        const [w, h] = config.resolution.split('x');
        const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
        const d = gcd(Number(w), Number(h));
        slideshow.setAspectRatio(`${w/d}/${h/d}`);
      }

      // --- Command System & Terminal ---
      const commands = new CommandSystem();
      commands.register({ name: 'next', label: 'Next slide/partial', execute: () => slideshow.next(), category: 'navigation' });
      commands.register({ name: 'prev', label: 'Previous slide/partial', execute: () => slideshow.prev(), category: 'navigation' });
      commands.register({ name: 'go-first', label: 'Go to first slide', execute: () => slideshow.goTo(0), category: 'navigation' });
      commands.register({ name: 'go-last', label: 'Go to last slide', execute: () => slideshow.goTo(slideshow.slideCount - 1), category: 'navigation' });
      commands.register({ name: 'fullscreen', label: 'Toggle fullscreen', execute: () => {
        if (document.fullscreenElement) { document.exitFullscreen(); }
        else { document.documentElement.requestFullscreen(); }
      }, category: 'view' });
      commands.register({ name: 'overview', label: 'Toggle overview mode', execute: () => { slideshow.mode = slideshow.mode === 'overview' ? 'present' : 'overview'; }, category: 'view' });
      commands.register({ name: 'speaker', label: 'Toggle speaker view', execute: () => { slideshow.mode = slideshow.mode === 'speaker' ? 'present' : 'speaker'; }, category: 'view' });

      // Terminal component
      const terminal = document.querySelector('geek-terminal');
      terminal.setCommandSystem(commands);

      // Key bindings
      const keys = new KeyBindings(commands);
      keys.onTerminalOpen(() => terminal.open());
      keys.activate();

      // Terminal close → return to normal mode
      terminal.addEventListener('geek:terminal:close', () => keys.closeTerminal());
    } catch (err) {
      document.body.innerHTML = `<pre style="padding: 2rem; color: #c00;">${err}</pre>`;
    }
  </script>
</body>
</html>

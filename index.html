<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeekSlides v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    /* Anchor the slideshow to the viewport regardless of document flow or deck CSS.
       External selectors override :host (higher specificity), so this is the
       canonical guarantee even if the shadow-DOM :host rule gets overridden. */
    geek-slideshow { position: fixed; inset: 0; }

    .gs-loading {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    .gs-loading.gs-hidden { opacity: 0; pointer-events: none; }
    .gs-loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: gs-spin 0.8s linear infinite;
    }
    @keyframes gs-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="gs-loading" id="gs-loading"><div class="gs-loading-spinner"></div></div>
  <script type="module" src="/packages/cli/app/main.js"></script>
</body>
</html>
